<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1b1035" />
  <title>Shake Cat 🐱 - 흔들기 카운터</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1 class="app__title">Shake Cat</h1>
      <p class="app__subtitle">기기를 흔들면 고양이가 반응해요!</p>
    </header>

    <section class="cat" id="cat" aria-label="고양이">
      <div class="cat__emoji" id="catEmoji">🐱</div>
    </section>

    <section class="counter" aria-live="polite">
      <div class="counter__value" id="count">0</div>
      <div class="counter__label">번 흔들었어요</div>
    </section>

    <section class="stats">
      <div class="stat">
        <span class="stat__value" id="force">0.0</span>
        <span class="stat__label">현재 흔들림 세기</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="best">0</span>
        <span class="stat__label">최고 기록</span>
      </div>
    </section>

    <div class="controls">
      <button class="btn btn--primary" id="startBtn">시작하기</button>
      <button class="btn btn--ghost" id="resetBtn">초기화</button>
    </div>

    <p class="status" id="status">아래 버튼을 눌러 센서를 켜주세요.</p>

    <a class="lab-link" href="lab.html">🧪 흔들기 패턴 실험실 →</a>

    <footer class="app__footer">
      <p>📱 모바일 기기에서 흔들어 보세요</p>
    </footer>
  </main>

  <script src="shake.js"></script>
</body>
</html>
